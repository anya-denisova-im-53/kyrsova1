<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your BTS Playlist Creator</title>
    <link rel="stylesheet" href="style.css">
</head>
<header>
    <h1>BTS Playlist Creator</h1>
    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
</header>
<body>
    <div class="app-container">
    <h1>Welcome to Your BTS Playlist Creator!</h1>
    <p>Discover your personalized BTS playlist based on your music preferences.</p>
    <img src="bts.jpg">
    <div class="controls">
            <button id="surpriseBtn">Surprise Me!</button>
            <button id="clearBtn"> Clear </button>
        </div>
    <div id="playlistDisplay" class="playlist-grid">
        </div>
    <button onclick="createPlaylist()">Create My Playlist</button>
    </div>
    <script src ="library.js"></script>
    <script src="playlist.js"></script>
</body>
<footer>
    <p>&copy; 2026 Your BTS Playlist Creator. All rights reserved.</p>  
  <div class="queue-controls" style="margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px;">
    <h3 style="color: white;">Queue Management (Task 4)</h3>
    <div class="buttons">
        <button onclick="handleDequeue('highest')" style="background: #9b59b6;">Play Highest Priority</button>
        <button onclick="handleDequeue('lowest')" style="background: #3498db;">Play Lowest Priority</button>
        <button onclick="handleDequeue('oldest')" style="background: #27ae60;">Play Oldest (FIFO)</button>
        <button onclick="handleDequeue('newest')" style="background: #e67e22;">Play Newest (LIFO)</button>
    </div>
    <p id="queueStatus" style="color: #bdc3c7; margin-top: 10px;">Queue is empty. Add songs from search!</p>
<button id = "runTask6Btn" >Run Task 6 Steam </button>
</button>
</div>  
</footer>
</html>
