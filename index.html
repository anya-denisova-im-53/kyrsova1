<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your BTS Playlist Creator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-nav">
        <div class="logo">BTS Playlist Creator</div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

<body>
    <div class="app-container">
        <header class="hero-section">
            <div class="hero-content">
                <div class="hero-text">
                    <h1>Welcome to Your BTS Playlist Creator!</h1>
                    <p>Discover your personalized BTS playlist based on your music preferences.</p>
                    <div class="main-buttons">
                        <button id="surpriseBtn">Surprise Me!</button>
                        <button id="clearBtn">Clear</button>
                    </div>
                </div>
                <div class="hero-image">
                    <img src="bts.jpg" alt="BTS">
                </div>
            </div>
        </header>

        <section class="queue-management">
            <h3>Queue Management </h3>
            <div class="queue-grid">
                <button onclick="handleDequeue('highest')" class="btn-highest">Play Highest Priority</button>
                <button onclick="handleDequeue('lowest')" class="btn-lowest">Play Lowest Priority</button>
                <button onclick="handleDequeue('oldest')" class="btn-oldest">Play Oldest (FIFO)</button>
                <button onclick="handleDequeue('newest')" class="btn-newest">Play Newest (LIFO)</button>
            </div>
            <p id="queueStatus">Queue is empty. Add songs from search!</p>
            
            <div class="task-extra">
                <button id="runTask6Btn" class="btn-stream">Run Stream</button>
            </div>
        </section>


        <section class="playlist-section">
            <button class="create-btn" onclick="createPlaylist()">Create My Playlist</button>
            <div id="playlistDisplay" class="playlist-grid">
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 Your BTS Playlist Creator. All rights reserved.</p>
    </footer>

    <script src="library.js"></script>
    <script src="playlist.js"></script>
</body>
